<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>JJC Reference Index</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<style>

body{
background:#0b0f19;
color:white;
font-family:Segoe UI,Arial;
margin:0;
}

.header{
background:#121826;
padding:18px 40px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1f2a44;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.priceBox{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.price{
font-size:44px;
font-weight:700;
}

.stats{
display:flex;
gap:20px;
}

.stat{
background:#121826;
padding:12px 20px;
border-radius:8px;
font-size:14px;
}

.stat span{
font-size:18px;
font-weight:600;
}

.chartBox{
background:#121826;
padding:20px;
border-radius:10px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
background:#1b2336;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.tab.active{
background:#2962ff;
}

.footer{
color:#7a8599;
font-size:12px;
margin-top:20px;
}

canvas{
width:100%;
}

.green{color:#16c784;}
.red{color:#ea3943;}

</style>

</head>

<body>

<div class="header">
JJC Reference Index
</div>

<div class="container">

<div class="priceBox">

<div class="price" id="rate">Loading...</div>

<div class="stats">

<div class="stat">
High<br>
<span id="high">-</span>
</div>

<div class="stat">
Low<br>
<span id="low">-</span>
</div>

<div class="stat">
Change<br>
<span id="change">-</span>
</div>

</div>

</div>

<div class="chartBox">

<div class="tabs">
<div class="tab active" onclick="setRange(24)">24H</div>
<div class="tab" onclick="setRange(168)">7D</div>
</div>

<canvas id="chart" height="110"></canvas>

</div>

<div class="footer">
Synthetic index derived from FX movements.  
Not a tradable currency.
</div>

</div>

<script>

const USD0=158.26;
const EUR0=183.99;
const EURUSD0=1.1627;

let history=[];
let hours=24;

/* Chart */

const ctx=document.getElementById("chart");

const chart=new Chart(ctx,{
type:"line",
data:{
datasets:[{
data:[],
borderColor:"#3b82f6",
borderWidth:2,
tension:0.25,
pointRadius:0
}]
},
options:{
animation:false,
plugins:{legend:{display:false}},
scales:{
x:{
type:"time",
time:{
unit:"hour"
},
grid:{color:"#1f2a44"}
},
y:{
grid:{color:"#1f2a44"}
}
}
}
});

/* JJC計算 */

function calcJJC(usd_jpy,usd_eur){

const eur_usd=1/usd_eur;
const eur_jpy=eur_usd*usd_jpy;

let jjc=
100*
Math.pow(usd_jpy/USD0,1/3)*
Math.pow(eur_jpy/EUR0,1/3)*
Math.pow(eur_usd/EURUSD0,1/3);

return Number(jjc.toFixed(2));

}

/* 履歴取得 */

async function loadHistory(){

let end=new Date();
let start=new Date();

start.setDate(end.getDate()-7);

let url=
`https://api.frankfurter.app/${start.toISOString().slice(0,10)}..${end.toISOString().slice(0,10)}?from=USD&to=JPY,EUR`;

let res=await fetch(url);
let data=await res.json();

let rates=data.rates;

for(let d in rates){

let usd_jpy=rates[d].JPY;
let usd_eur=rates[d].EUR;

history.push({
time:new Date(d).getTime(),
price:calcJJC(usd_jpy,usd_eur)
});

}

drawChart();
updateStats();

}

/* chart描画 */

function drawChart(){

let data;

if(hours===24){
data=history.slice(-24);
}else{
data=history;
}

chart.data.datasets[0].data=data.map(d=>({
x:d.time,
y:d.price
}));

chart.options.scales.x.time.unit=
hours===24?"hour":"day";

chart.update();

}

/* stats */

function updateStats(){

let data=(hours===24)?history.slice(-24):history;

let prices=data.map(d=>d.price);

let high=Math.max(...prices);
let low=Math.min(...prices);

document.getElementById("high").innerText=high;
document.getElementById("low").innerText=low;

let change=((prices.at(-1)-prices[0])/prices[0])*100;

let el=document.getElementById("change");

el.innerText=change.toFixed(2)+"%";

el.className=change>=0?"green":"red";

document.getElementById("rate").innerText=prices.at(-1);

}

/* range */

function setRange(h){

hours=h;

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

event.target.classList.add("active");

drawChart();
updateStats();

}

/* 最新値 */

async function updateCurrent(){

const res=await fetch("https://open.er-api.com/v6/latest/USD");
const data=await res.json();

let usd_jpy=data.rates.JPY;
let usd_eur=data.rates.EUR;

let jjc=calcJJC(usd_jpy,usd_eur);

history.push({
time:Date.now(),
price:jjc
});

if(history.length>168){
history.shift();
}

drawChart();
updateStats();

}

loadHistory();

setInterval(updateCurrent,60000);

</script>

</body>
</html>
